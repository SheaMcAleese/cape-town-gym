<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CT Gym" />
  <title>Cape Town 14-Day</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="appbar">
    <button id="backBtn" class="iconbtn" aria-label="Back" hidden>‹</button>
    <div id="appbarTitle">Cape Town 14-Day</div>
    <button id="resetBtn" class="iconbtn" aria-label="Reset" title="Reset progress">⋯</button>
  </header>

  <main id="view"></main>

  <!-- Rest timer dock -->
  <div id="timerDock" hidden>
    <div id="timerDisplay">0:00</div>
    <div class="timerControls">
      <button data-sec="60" class="chip">60s</button>
      <button data-sec="90" class="chip">90s</button>
      <button data-sec="120" class="chip">2m</button>
      <button id="timerStop" class="chip stop">Stop</button>
    </div>
  </div>

  <button id="timerFab" class="fab" aria-label="Rest timer">⏱</button>

  <script src="program.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
